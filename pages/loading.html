<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>进入中...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* 星空背景 */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 主容器 */
        .loader-container {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        /* 旋转的爱心环 */
        .heart-ring {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .heart-item {
            position: absolute;
            font-size: 40px;
            animation: pulse 1s ease-in-out infinite;
        }

        .heart-item:nth-child(1) { top: 0; left: 50%; transform: translateX(-50%); animation-delay: 0s; }
        .heart-item:nth-child(2) { top: 15%; right: 15%; animation-delay: 0.15s; }
        .heart-item:nth-child(3) { top: 50%; right: 0; transform: translateY(-50%); animation-delay: 0.3s; }
        .heart-item:nth-child(4) { bottom: 15%; right: 15%; animation-delay: 0.45s; }
        .heart-item:nth-child(5) { bottom: 0; left: 50%; transform: translateX(-50%); animation-delay: 0.6s; }
        .heart-item:nth-child(6) { bottom: 15%; left: 15%; animation-delay: 0.75s; }
        .heart-item:nth-child(7) { top: 50%; left: 0; transform: translateY(-50%); animation-delay: 0.9s; }
        .heart-item:nth-child(8) { top: 15%; left: 15%; animation-delay: 1.05s; }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.6;
            }
            50% {
                transform: scale(1.3);
                opacity: 1;
            }
        }

        /* 中心大爱心 */
        .center-heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            animation: heartbeat 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255, 20, 147, 0.8));
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
            }
            25% {
                transform: translate(-50%, -50%) scale(1.1);
            }
            50% {
                transform: translate(-50%, -50%) scale(1);
            }
            75% {
                transform: translate(-50%, -50%) scale(1.15);
            }
        }

        /* 加载文字 */
        .loading-text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .loading-dots {
            display: inline-block;
            width: 60px;
            text-align: left;
        }

        .dot {
            animation: blink 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0%, 60%, 100% {
                opacity: 0;
            }
            30% {
                opacity: 1;
            }
        }

        /* 进度条 */
        .progress-container {
            width: 300px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff1493, #ff69b4, #ff1493);
            background-size: 200% 100%;
            border-radius: 10px;
            animation: progressGlow 2s linear infinite;
            width: 0%;
            transition: width 0.3s ease;
        }

        @keyframes progressGlow {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        /* 粒子效果 */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ff69b4;
            border-radius: 50%;
            pointer-events: none;
            animation: particleFloat 3s ease-out infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(0);
                opacity: 0;
            }
        }

        /* 欢迎文字 */
        .welcome-text {
            color: #ff69b4;
            font-size: 18px;
            margin-top: 20px;
            opacity: 0.8;
        }

        .user-name {
            color: #ff1493;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="stars" id="stars"></div>

    <!-- 加载容器 -->
    <div class="loader-container">
        <!-- 旋转的爱心环 -->
        <div class="heart-ring">
            <div class="heart-item">💗</div>
            <div class="heart-item">💕</div>
            <div class="heart-item">💖</div>
            <div class="heart-item">💝</div>
            <div class="heart-item">💗</div>
            <div class="heart-item">💕</div>
            <div class="heart-item">💖</div>
            <div class="heart-item">💝</div>
            <!-- 中心大爱心 -->
            <div class="center-heart">💖</div>
        </div>

        <!-- 加载文字 -->
        <div class="loading-text">
            正在为您推开纯爱的大门<span class="loading-dots"><span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></span>
        </div>

        <!-- 进度条 -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- 欢迎文字 -->
        <div class="welcome-text">
            欢迎回来，<span class="user-name" id="userName">访客</span>！
        </div>
    </div>

    <script>
        // 生成星空
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }

        // 生成粒子效果
        setInterval(() => {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.bottom = '0';
            particle.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, 3000);
        }, 200);

        // 获取用户名
        const userName = localStorage.getItem('user_name') || '访客';
        document.getElementById('userName').textContent = userName;

        // 模拟加载进度
        const progressBar = document.getElementById('progressBar');
        let progress = 0;

        const loadingInterval = setInterval(() => {
            progress += Math.random() * 15 + 5;
            if (progress >= 100) {
                progress = 100;
                progressBar.style.width = progress + '%';
                clearInterval(loadingInterval);

                // 加载完成后跳转（带转场特效）
                setTimeout(() => {
                    sessionStorage.setItem('allow_home', '1');
                    transitionTo('../index.html', 'curtain');
                }, 500);
            } else {
                progressBar.style.width = progress + '%';
            }
        }, 200);
    </script>
    <script src="../assets/js/transition.js"></script>
</body>
</html>
