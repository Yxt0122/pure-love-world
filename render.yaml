services:
  - type: web
    name: pure-love-world
    env: python
    plan: free
    rootDir: .
    buildCommand: cd services/comment-backend && pip install -r requirements.txt
    startCommand: cd services/comment-backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: API_BASE_URL
        value: https://pure-love-world.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: pure-love-db
          property: connectionString

databases:
  - name: pure-love-db
    plan: free
